services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env.docker
    environment:
      CHAT_SERVER_PORT: 4174
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4174:4174"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4174/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_CHAT_MAX_RAG_DOCS: "5"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
